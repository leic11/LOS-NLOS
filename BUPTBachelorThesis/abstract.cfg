% ABSTRACT
\def\abstracten{
Global Navigation Satellite System (GNSS) is susceptible to Non-Line-of-Sight (NLOS) propagation in urban complex environments due to signal reflection from buildings, resulting in significant positioning errors. This paper proposes a Spatiotemporal Cross-Attention (STCA) model for GNSS NLOS identification via spatiotemporal feature fusion and sparse representation.

The model employs a dual-channel architecture: a spatial channel captures the distribution characteristics of multiple visible satellites at the same epoch, while a temporal channel tracks the signal evolution of a single satellite across consecutive epochs. Through a cross-attention module, spatial and temporal features interact bidirectionally in the embedding space, automatically learning the importance weights of features from different satellites and epochs. A sparse representation layer is introduced to force the model to learn more discriminative and compact feature representations.

Experimental results show that in the indomain scenario, the model achieves an accuracy of 73.89\% with training loss converging to 0.6273. Ablation studies verify the effectiveness of each module, and the optimal time window size is 10 epochs.
}

