% ABSTRACT
\def\abstracten{
Global Navigation Satellite System (GNSS) is susceptible to Non-Line-of-Sight (NLOS) signal interference in urban complex environments such as urban canyons, resulting in significant positioning errors that severely affect the reliability of applications such as intelligent transportation and drone navigation. Existing detection methods often rely on single-epoch threshold judgment or shallow machine learning models, making it difficult to effectively capture the multidimensional features of satellite signals in spatial distribution and temporal evolution. To address this issue, this paper proposes a NLOS signal detection method based on Spatiotemporal Cross-Attention (STCA).

The main contributions of this paper are as follows:

(1) A dual-channel feature extraction architecture and cross-attention fusion mechanism are designed. For the characteristics of GNSS signals that contain both spatial distribution properties and temporal evolution patterns, a parallel feature extraction path consisting of a spatial encoder and a temporal encoder is constructed to capture the satellite spatial geometric relationship and the signal quality variation over time, respectively. Through the cross-attention module, taking temporal features as queries and spatial features as keys and values, an adaptive association is established, enabling the model to attend to relevant spatial features based on the temporal state. A sparse representation layer is introduced to perform nonlinear transformation of the fused features and enhance their discriminability.

(2) Systematic experimental verification and ablation analysis are completed. The model performance is evaluated under two scenarios: in-domain split and out-domain split, to verify the generalization ability of the model. The contribution of each functional module to the final performance is quantitatively analyzed through ablation experiments, and the window length experiment explores the optimal way to utilize temporal information. Experimental results show that the model achieves an accuracy of 76.02% and a ROC-AUC of 0.8407 in the in-domain scenario, with the optimal performance at a window size of 8 epochs.
}

