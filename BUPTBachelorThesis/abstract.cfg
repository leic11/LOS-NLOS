% 中文摘要
\def\abstractzh{
准确识别GNSS非视距（NLOS）信号是提升城市峡谷等复杂环境下定位精度的关键前提。NLOS检测面临多径/NLOS难区分、跨场景泛化困难、信号模式时变等核心挑战。为应对上述问题，本文提出了一种基于时空交叉注意力（STCA）的GNSS NLOS信号检测方法，从时空特征融合、稀疏表示增强和系统性实验验证等方面展开研究。

本文的主要工作包括：

（1）设计了时空双通道特征提取架构与交叉注意力融合机制。空间编码器利用多头自注意力提取多颗可见卫星的空间几何分布特征，时间编码器采用单向LSTM捕捉信号质量的时序演化，并通过交叉注意力模块以时序特征为查询、空间特征为键值，建立时空特征的自适应关联。在此基础上引入可学习稀疏表示层，增强融合特征的判别能力。

（2）提出了基于外域划分的评估策略，构建了完整的数据预处理与模型训练测试流程。采用三步数据过滤策略清洗原始数据，通过Z-score标准化消除量纲差异，并采用外域划分模式（5个测点训练、2个测点测试）验证跨场景泛化能力。实验结果表明，STCA模型在外域测试集上准确率达85.98\%，ROC-AUC达0.8583。

（3）设计了系统的消融实验，评估了各功能模块对模型性能的贡献。超参数敏感性分析对5个关键超参数进行测试，确认了最优配置（$d_s=32$，$H=4$，$L=1$，$p_\text{drop}=0.5$，$d_t=16$）。时间窗口敏感性分析测试了14种窗口配置，结果表明窗口大小为22时性能最优（准确率85.98\%，F1分数83.34\%）。模块消融实验验证了交叉注意力使准确率从基线模型的71.03\%提升至79.68\%，完整STCA模型进一步将准确率提升至85.98\%，较基线提升14.95个百分点。
}

