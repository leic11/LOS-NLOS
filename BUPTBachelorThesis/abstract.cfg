% 中文摘要
\def\abstractzh{
准确识别全球导航卫星系统（Global Navigation Satellite System, GNSS）非视距（Non-Line-of-Sight, NLOS）信号对提升城市峡谷等复杂环境下定位精度很重要。NLOS检测的主要困难在于多径与NLOS信号不易区分、跨场景泛化能力弱、信号模式随时间变化。为此，本文实现并验证了一种基于时空交叉注意力（Spatiotemporal Cross-Attention, STCA）的GNSS NLOS信号检测方法，从时空特征融合、稀疏表示增强和实验验证等方面展开研究。

本文的主要工作包括：

（1）实现了时空双通道特征提取架构与交叉注意力融合机制。空间编码器利用多头自注意力提取多颗可见卫星的空间几何分布特征，时间编码器采用单向长短期记忆网络（Long Short-Term Memory, LSTM）捕捉信号质量的时序演化，并通过交叉注意力模块以时序特征为查询、空间特征为键值，建立时空特征的自适应关联。在此基础上引入可学习稀疏表示层，增强融合特征的判别能力。

（2）提出了基于外域划分的评估策略，构建了完整的数据预处理与模型训练测试流程。采用三步数据过滤策略清洗原始数据，通过Z-score（标准分数）标准化消除量纲差异，并采用外域划分模式（5个测点训练、2个测点测试）验证跨场景泛化能力。实验结果表明，STCA模型在外域测试集上准确率达85.98\%，受试者工作特征曲线下面积（Receiver Operating Characteristic - Area Under Curve, ROC-AUC）达0.8583。

（3）进行了消融实验，评估了各功能模块对模型性能的贡献。超参数敏感性分析确认了最优超参数配置，时间窗口敏感性分析确定了最优窗口大小。模块消融实验验证了交叉注意力使准确率从基线模型的71.03\%提升至79.68\%，完整STCA模型进一步将准确率提升至85.98\%，较基线提升14.95个百分点。
}

