% 中文摘要
\def\abstractzh{
全球导航卫星系统（GNSS）在城市峡谷等复杂环境中易受非视距（Non-Line-of-Sight, NLOS）信号干扰，导致定位误差显著增大，严重影响智能交通、无人机导航等应用的可靠性。现有检测方法多依赖单历元阈值判断或浅层机器学习模型，难以有效捕捉卫星信号在空间分布与时序演变上的多维特征。针对这一问题，本文提出一种基于时空交叉注意力（Spatiotemporal Cross-Attention, STCA）的 NLOS 信号检测方法。

本文的主要工作包括：

（1）设计了时空双通道特征提取架构与交叉注意力融合机制。针对 GNSS 信号同时包含空间分布特性和时序演化规律的特点，构建空间编码器与时间编码器并行的特征提取路径，分别捕捉卫星空间几何关系与信号质量随时间的变化模式。通过交叉注意力模块，以时序特征为查询、空间特征为键值，建立自适应关联，使模型能够根据时序状态关注相关的空间特征。引入稀疏表示层对融合特征进行非线性变换，增强特征的判别性。

（2）完成了系统性实验验证与消融分析。在内域划分与外域划分两种场景下评估模型性能，验证模型的泛化能力。通过消融实验定量分析各功能模块对最终性能的贡献，窗口长度实验探究时序信息的最优利用方式。实验结果表明，模型在内域场景下准确率达到 76.02\%，ROC-AUC 为 0.8407，窗口大小为 8 历元时性能最优。
}

