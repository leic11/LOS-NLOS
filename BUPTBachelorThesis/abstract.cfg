\def\abszhkeyone{GNSS}
\def\abszhkeytwo{NLOS 检测}
\def\abszhkeythree{时空特征融合}
\def\abszhkeyfour{交叉注意力}
\def\abszhkeyfive{稀疏表示}

% ABSTRACT
\def\abstracten{
Accurate identification of Non-Line-of-Sight (NLOS) signals in Global Navigation Satellite System (GNSS) is critical for improving positioning accuracy in complex urban environments. NLOS detection faces core challenges including the difficulty in distinguishing multipath from NLOS signals, poor cross-scenario generalization, and time-varying signal patterns. To address these challenges, this paper proposes a GNSS NLOS signal detection method based on Spatiotemporal Cross-Attention (STCA), focusing on spatiotemporal feature fusion, sparse representation enhancement, and systematic experimental validation.

The main contributions are as follows:

(1) A spatiotemporal dual-channel feature extraction architecture with a cross-attention fusion mechanism is designed. The spatial encoder employs multi-head self-attention to extract the geometric distribution features of visible satellites, while the temporal encoder uses a unidirectional LSTM to capture the temporal evolution of signal quality. A cross-attention module establishes adaptive correlations between spatiotemporal features by treating temporal features as queries and spatial features as keys/values. A learnable sparse representation layer is further introduced to enhance the discriminative capability of fused features.

(2) An outdomain evaluation strategy is proposed, along with a complete data preprocessing and model training/testing pipeline. A three-step data filtering strategy is used for data cleaning, Z-score normalization eliminates feature scale differences, and an outdomain split mode (5 locations for training, 2 locations for testing) validates cross-scenario generalization. Experimental results show that the STCA model achieves an accuracy of 85.98\% and an ROC-AUC of 0.8583 on the outdomain test set.

(3) A systematic ablation study is designed to evaluate the contribution of each functional module. Hyperparameter sensitivity analysis across 5 key parameters confirms the optimal configuration ($d_s=32$, $H=4$, $L=1$, $p_\text{drop}=0.5$, $d_t=16$). Time window sensitivity analysis across 14 configurations reveals that a window size of 22 yields optimal performance (85.98\% accuracy, 83.34\% F1 score). Module ablation experiments demonstrate that the cross-attention module improves accuracy from 71.03\% (baseline) to 79.68\%, and the complete STCA model further achieves 85.98\% accuracy, a 14.95 percentage point improvement over the baseline.
}

