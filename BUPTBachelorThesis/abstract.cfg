\def\abszhkeyone{GNSS}
\def\abszhkeytwo{NLOS 检测}
\def\abszhkeythree{时空特征融合}
\def\abszhkeyfour{交叉注意力}
\def\abszhkeyfive{稀疏表示}

% ABSTRACT
\def\abstracten{
Accurate identification of Non-Line-of-Sight (NLOS) signals in Global Navigation Satellite System (GNSS) is important for improving positioning accuracy in complex urban environments. The primary challenges in NLOS detection lie in distinguishing multipath effects from NLOS reception, achieving robust cross-scenario generalization, and capturing the time-varying nature of signal patterns. This thesis proposes a GNSS NLOS signal detection method based on Spatiotemporal Cross-Attention (STCA), focusing on spatiotemporal feature fusion, sparse representation enhancement, and experimental validation.

The main contributions are as follows:

(1) We implement a dual-channel architecture that extracts spatial geometric features via multi-head self-attention and temporal evolution patterns via a unidirectional Long Short-Term Memory (LSTM), and fuse them adaptively through a cross-attention mechanism. The spatial encoder employs multi-head self-attention to extract the geometric distribution features of visible satellites, while the temporal encoder uses a unidirectional LSTM to capture the temporal evolution of signal quality. A cross-attention module establishes adaptive correlations between spatiotemporal features by treating temporal features as queries and spatial features as keys/values. A learnable sparse representation layer is further introduced to enhance the discriminative capability of fused features.

(2) We propose an out-of-domain evaluation strategy and establish a complete data preprocessing and model training/testing pipeline. A three-step data filtering strategy is used for data cleaning, Z-score normalization eliminates feature scale differences, and an out-of-domain split mode (5 locations for training, 2 locations for testing) validates cross-scenario generalization. Experimental results show that the STCA model achieves an accuracy of 85.98\% and an ROC-AUC of 0.8583 on the out-of-domain test set.

(3) We conduct a systematic ablation study to evaluate the contribution of each functional module. Hyperparameter sensitivity analysis confirms the optimal configuration, and time window sensitivity analysis determines the optimal window size. Module ablation experiments demonstrate that the cross-attention module improves accuracy from 71.03\% (baseline) to 79.68\%, and the complete STCA model further achieves 85.98\% accuracy, a 14.95 percentage point improvement over the baseline.
}

