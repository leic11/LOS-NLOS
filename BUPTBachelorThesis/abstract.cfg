% 中文摘要
\def\abstractzh{
全球导航卫星系统（GNSS）在城市复杂环境中容易受到建筑物反射影响，产生非视距（Non-Line-of-Sight, NLOS）传播问题，导致定位误差大幅增加。本文提出一种基于时空特征融合和稀疏表示的 GNSS NLOS 识别模型（Spatiotemporal Cross-Attention Model, STCA）。

该模型采用时空双通道特征提取架构：空间通道捕获同一时刻多颗可见卫星的分布特征，时间通道追踪单颗卫星在连续多个历元的信号演化趋势。通过交叉注意力模块，使空间特征与时间特征在嵌入空间进行双向交互，自动学习不同卫星、不同时刻特征的重要性权重。同时引入稀疏表示层，迫使模型学习更具判别性的紧凑特征表示。

实验结果表明，在内域场景下，模型准确率达到 73.89\%，训练损失收敛至 0.6273。消融实验验证了各模块的有效性，时间窗口大小为 10 时性能最优。
}

