\def\thankwords{
行文至此，落笔为终。四载邮苑，忽焉已过。

感谢孙老师与顾学长。毕设期间，从选题到定稿，孙老师以严谨的治学态度与温和的耐心指引着我。每一次讨论、每一处批注，都让我看见学术应有的模样。而从实验设计到代码调试，从论文框架到字句推敲，每一步都浸润着顾明澈学长的指教。得遇良师益友，幸甚至哉。

感谢619和227宿舍的同学们。四年来，我们挤在一方小小的屋子里，分享过凌晨的泡面，也交换过各自不着边际的梦想。那些熄灯后的卧谈、考试周的互相打气、失意时递过来的一罐可乐，是我青春里最鲜活的记忆。此去山高水远，愿我们各有坦途。

感谢电子工程学院的师长与同窗，感谢这段旅程中所有温暖的相遇。

感谢我的父母，以沉默而辽阔的爱，托举我看见更大的世界。

最后，还要谢谢四年前那个懵懂又勇敢的自己。毕业不是终点，而是背起行囊，奔赴下一场山海。
